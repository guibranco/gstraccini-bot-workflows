name: Dotnet Centralised Package Converter

on:
  workflow_dispatch:
    inputs:
      owner:
        description: "The owner of the repository"
        required: true
      repository:
        description: "The repository name"
        required: true
      branch:
        description: "The branch to push changes to"
        required: true
      pull_request:
        description: "PR number (for comment feedback)"
        required: true
      installationId:
        description: "GitHub App installation ID"
        required: true
      checkRunId:
        description: "Check run ID"
        required: true
      autofix:
        description: "Attempt to automatically fix NU1010/NU1008 errors by adding missing PackageVersion entries and removing duplicate Version attributes"
        required: false
        default: "false"

env:
  GHA_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

jobs:
  centralised-package-converter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - name: Generate a token
        id: generate_token
        uses: tibdex/github-app-token@v2.1.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
          installation_retrieval_mode: id
          installation_retrieval_payload: ${{ github.event.inputs.installationId }}

      - name: Mark check run as in_progress
        uses: LouisBrunner/checks-action@v3.1.0
        with:
          token: ${{ steps.generate_token.outputs.token }}
          repo: ${{ github.event.inputs.owner }}/${{ github.event.inputs.repository }}
          check_id: ${{ github.event.inputs.checkRunId }}
          status: in_progress
          details_url: ${{ env.GHA_URL }}
          output: |
            {"title": "Conversion started 🛠️", "summary": "Installing and running central-pkg-converter."}

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          repository: "${{ github.event.inputs.owner }}/${{ github.event.inputs.repository }}"
          ref: ${{ github.event.inputs.branch }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Check for .sln or .slnx file in root
        id: check_sln
        run: |
          SLN_FILE=$(ls *.slnx 2>/dev/null | head -1)
          if [ -z "$SLN_FILE" ]; then
            SLN_FILE=$(ls *.sln 2>/dev/null | head -1)
          fi
          if [ -z "$SLN_FILE" ]; then
            echo "❌ No .sln or .slnx file found in repository root!"
            exit 1
          fi
          echo "SLN_FILE=$SLN_FILE" >> $GITHUB_ENV
          echo "Found solution file: $SLN_FILE"

      - name: Install central-pkg-converter
        run: dotnet tool install --global CentralisedPackageConverter

      - name: Run central-pkg-converter
        run: |
          NO_COLOR=1 central-pkg-converter -f -t "./" 2>&1 | sed 's/\x1b\[[0-9;]*[a-zA-Z]//g; s/\[[a-zA-Z0-9/]*\]//g' >> central-pkg-converter.log

      - name: Autofix missing PackageVersion entries
        if: ${{ github.event.inputs.autofix == 'true' }}
        run: |
          printf "\n--- Autofix ---\n" >> central-pkg-converter.log
          cat > /tmp/cpm_autofix.py << 'AUTOFIX'
          import re, os, glob

          props_file = "Directory.Packages.props"

          if not os.path.exists(props_file):
              print("No Directory.Packages.props found, skipping autofix.")
              exit(0)

          props_content = open(props_file).read()

          # Packages already declared in Directory.Packages.props
          existing = set(re.findall(r'<PackageVersion\s+Include="([^"]+)"', props_content))

          # Collect packages with explicit versions from csproj files not yet in props (NU1010 fix)
          to_add = {}
          for csproj in sorted(glob.glob("**/*.csproj", recursive=True)):
              content = open(csproj).read()
              for m in re.finditer(r'<PackageReference\s+Include="([^"]+)"(?:[^>]*?)Version="([^"]+)"', content, re.DOTALL):
                  pkg, ver = m.group(1), m.group(2).strip()
                  if ver and ver != "." and pkg not in existing and pkg not in to_add:
                      to_add[pkg] = ver

          if to_add:
              entries = "\n".join(f'    <PackageVersion Include="{p}" Version="{v}" />' for p, v in sorted(to_add.items()))
              insert_at = props_content.rfind("</ItemGroup>")
              if insert_at == -1:
                  props_content = props_content.replace("</Project>", f"  <ItemGroup>\n{entries}\n  </ItemGroup>\n</Project>")
              else:
                  props_content = props_content[:insert_at] + entries + "\n  " + props_content[insert_at:]
              open(props_file, "w").write(props_content)
              print(f"Added {len(to_add)} missing PackageVersion entries to {props_file}:")
              for p, v in sorted(to_add.items()):
                  print(f"  {p} {v}")
          else:
              print(f"No missing PackageVersion entries with resolvable versions found.")

          # NU1008 fix: remove Version from PackageReference where PackageVersion now exists
          all_versioned = set(re.findall(r'<PackageVersion\s+Include="([^"]+)"', props_content))
          fixed_files = []
          for csproj in sorted(glob.glob("**/*.csproj", recursive=True)):
              content = open(csproj).read()
              new_content = content
              for pkg in all_versioned:
                  new_content = re.sub(
                      r'(<PackageReference\s+Include="' + re.escape(pkg) + r'"[^>]*?)\s+Version="[^"]*"',
                      r"\1", new_content, flags=re.DOTALL)
              if new_content != content:
                  open(csproj, "w").write(new_content)
                  fixed_files.append(csproj)

          if fixed_files:
              print(f"\nRemoved stale Version attribute from {len(fixed_files)} project file(s) (NU1008 fix):")
              for f in fixed_files:
                  print(f"  {f}")
          AUTOFIX
          python3 /tmp/cpm_autofix.py >> central-pkg-converter.log 2>&1
          rm -f /tmp/cpm_autofix.py

      - name: Validate conversion
        id: validate
        continue-on-error: true
        run: |
          printf "\n--- Validation (dotnet restore) ---\n" >> central-pkg-converter.log
          dotnet restore --ignore-failed-sources "$SLN_FILE" 2>&1 | sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' >> central-pkg-converter.log

      - name: Read central-pkg-converter.log
        uses: guibranco/github-file-reader-action-v2@v2.3.20
        id: log
        with:
          path: central-pkg-converter.log

      - name: Delete central-pkg-converter.log
        run: rm central-pkg-converter.log 2> /dev/null

      - name: Update PR with comment (conversion output)
        uses: mshick/add-pr-comment@v3
        if: ${{ steps.log.outputs.contents != '' }}
        with:
          repo-token: ${{ steps.generate_token.outputs.token }}
          repo-owner: ${{ github.event.inputs.owner }}
          repo-name: ${{ github.event.inputs.repository }}
          issue: ${{ github.event.inputs.pull_request }}
          refresh-message-position: true
          allow-repeats: true
          message: |
            :package: [Centralised Package Converter](${{ env.GHA_URL }}) result:

            ```
            ${{ steps.log.outputs.contents }}
            ```

      - name: Update PR with comment (no output)
        uses: mshick/add-pr-comment@v3
        if: ${{ steps.log.outputs.contents == '' }}
        with:
          repo-token: ${{ steps.generate_token.outputs.token }}
          repo-owner: ${{ github.event.inputs.owner }}
          repo-name: ${{ github.event.inputs.repository }}
          issue: ${{ github.event.inputs.pull_request }}
          refresh-message-position: true
          allow-repeats: true
          message: |
            :warning: [Centralised Package Converter](${{ env.GHA_URL }}) executed with no output.

      - name: Fail if validation failed
        if: steps.validate.outcome == 'failure'
        run: |
          echo "❌ dotnet restore failed after conversion — some packages may be missing from Directory.Packages.props."
          echo "Check the log above for NU1010 errors and add the missing PackageVersion entries manually."
          exit 1

      - name: Verify Changed files
        uses: tj-actions/verify-changed-files@v20
        id: verify-changed-files

      - name: Config git
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: |
          git config --local user.email "150967461+gstraccini[bot]@users.noreply.github.com"
          git config --local user.name "gstraccini[bot]"
          git config --global --add --bool push.autoSetupRemote true

      - name: Commit files
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: |
          git add .
          git commit -m "Convert to centralised package management via central-pkg-converter"
          echo "sha1=$(git rev-parse HEAD)" >> $GITHUB_ENV
          git push origin ${{ github.event.inputs.branch }}

      - name: Mark check run as success
        if: success()
        uses: LouisBrunner/checks-action@v3.1.0
        with:
          token: ${{ steps.generate_token.outputs.token }}
          repo: ${{ github.event.inputs.owner }}/${{ github.event.inputs.repository }}
          check_id: ${{ github.event.inputs.checkRunId }}
          conclusion: success
          details_url: ${{ env.GHA_URL }}
          output: |
            {"title": "Conversion successful ✅", "summary": "See details in the workflow run."}

      - name: Update PR with comment (failed)
        uses: mshick/add-pr-comment@v3
        if: ${{ failure() }}
        with:
          repo-token: ${{ steps.generate_token.outputs.token }}
          repo-owner: ${{ github.event.inputs.owner }}
          repo-name: ${{ github.event.inputs.repository }}
          issue: ${{ github.event.inputs.pull_request }}
          refresh-message-position: true
          allow-repeats: true
          message: |
            :x: [Centralised Package Converter](${{ env.GHA_URL }}) failed!

      - name: Mark check run as failure
        if: failure()
        uses: LouisBrunner/checks-action@v3.1.0
        with:
          token: ${{ steps.generate_token.outputs.token }}
          repo: ${{ github.event.inputs.owner }}/${{ github.event.inputs.repository }}
          check_id: ${{ github.event.inputs.checkRunId }}
          conclusion: failure
          details_url: ${{ env.GHA_URL }}
          output: |
            {"title": "Conversion failed ❌", "summary": "Check the logs for errors during package conversion."}

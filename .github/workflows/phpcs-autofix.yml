name: PHPCS Autofix

on:
  workflow_dispatch:
    inputs:
      owner:
        description: "The owner of the repository"
        required: true
      repository:
        description: "The repository name"
        required: true
      branch:
        description: "The branch to format and push changes to"
        required: true
      pull_request:
        description: "PR number (for comment feedback)"
        required: true
      installationId:
        description: "GitHub App installation ID"
        required: true
      checkRunId:
        description: "Check run ID"
        required: true
      standard:
        description: "PHPCS coding standard (e.g., PSR12, PSR2, WordPress) — ignored if phpcs.xml exists"
        required: false
        default: "PSR12"

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  GHA_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

jobs:
  phpcs-autofix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - name: Generate a token
        id: generate_token
        uses: tibdex/github-app-token@v2.1.0
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
          installation_retrieval_mode: id
          installation_retrieval_payload: ${{ github.event.inputs.installationId }}

      - name: Mark check run as in_progress
        uses: LouisBrunner/checks-action@v3.1.0
        with:
          token: ${{ steps.generate_token.outputs.token }}
          repo: ${{ github.event.inputs.owner }}/${{ github.event.inputs.repository }}
          check_id: ${{ github.event.inputs.checkRunId }}
          status: in_progress
          details_url: ${{ env.GHA_URL }}
          output: |
            {"title": "Workflow started 🏃🏻‍➡️", "summary": "See details in the workflow run."}

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          repository: "${{ github.event.inputs.owner }}/${{ github.event.inputs.repository }}"
          ref: ${{ github.event.inputs.branch }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Read PHP version from composer.json
        id: php-version
        run: |
          VERSION=$(jq -r '.require.php // "8.2"' composer.json \
            | grep -oP '\d+\.\d+' | head -1)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Read required extensions from composer.json
        id: php-extensions
        run: |
          EXTS=$(jq -r '[.require | to_entries[] | select(.key | startswith("ext-")) | .key | ltrimstr("ext-")] | join(",")' composer.json)
          echo "extensions=${EXTS}" >> $GITHUB_OUTPUT

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ steps.php-version.outputs.version }}
          extensions: ${{ steps.php-extensions.outputs.extensions }}
          tools: composer:v2

      - name: Check if PHPCS is in composer.json
        id: check-phpcs
        run: |
          if jq -e '(."require-dev" // {}) + (."require" // {}) | has("squizlabs/php_codesniffer")' composer.json > /dev/null 2>&1; then
            echo "phpcs_in_composer=true" >> $GITHUB_OUTPUT
          else
            echo "phpcs_in_composer=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies via Composer
        if: ${{ steps.check-phpcs.outputs.phpcs_in_composer == 'true' }}
        run: composer install --no-interaction --no-ansi --no-progress

      - name: Install PHPCS globally
        if: ${{ steps.check-phpcs.outputs.phpcs_in_composer == 'false' }}
        run: |
          composer global require squizlabs/php_codesniffer --no-interaction --no-ansi --no-progress
          echo "$HOME/.composer/vendor/bin" >> $GITHUB_PATH
          echo "$HOME/.config/composer/vendor/bin" >> $GITHUB_PATH

      - name: Resolve PHPCS binaries and standard args
        id: phpcs-config
        run: |
          if [ "${{ steps.check-phpcs.outputs.phpcs_in_composer }}" == "true" ]; then
            echo "phpcs=./vendor/bin/phpcs" >> $GITHUB_OUTPUT
            echo "phpcbf=./vendor/bin/phpcbf" >> $GITHUB_OUTPUT
          else
            echo "phpcs=phpcs" >> $GITHUB_OUTPUT
            echo "phpcbf=phpcbf" >> $GITHUB_OUTPUT
          fi

          if [ -f "phpcs.xml" ] || [ -f "phpcs.xml.dist" ] || [ -f ".phpcs.xml" ] || [ -f ".phpcs.xml.dist" ]; then
            echo "standard_args=" >> $GITHUB_OUTPUT
          else
            echo "standard_args=--standard=${{ github.event.inputs.standard }}" >> $GITHUB_OUTPUT
          fi

      - name: Run PHPCS check
        continue-on-error: true
        run: |
          set -e
          ${{ steps.phpcs-config.outputs.phpcs }} ${{ steps.phpcs-config.outputs.standard_args }} . >> phpcs.log 2>&1

      - name: Read phpcs.log
        uses: guibranco/github-file-reader-action-v2@v2.3.4
        id: log
        with:
          path: phpcs.log

      - name: Delete phpcs.log
        run: rm phpcs.log 2> /dev/null

      - name: Update PR with comment (issues found)
        uses: mshick/add-pr-comment@v3
        if: ${{ steps.log.outputs.contents != '' }}
        with:
          repo-token: ${{ steps.generate_token.outputs.token }}
          repo-owner: ${{ github.event.inputs.owner }}
          repo-name: ${{ github.event.inputs.repository }}
          issue: ${{ github.event.inputs.pull_request }}
          refresh-message-position: true
          allow-repeats: true
          message: |
            :white_check_mark: [PHPCS](${{ env.GHA_URL }}) result:

            ```
            ${{ steps.log.outputs.contents }}
            ```

      - name: Update PR with comment (no issues)
        uses: mshick/add-pr-comment@v3
        if: ${{ steps.log.outputs.contents == '' }}
        with:
          repo-token: ${{ steps.generate_token.outputs.token }}
          repo-owner: ${{ github.event.inputs.owner }}
          repo-name: ${{ github.event.inputs.repository }}
          issue: ${{ github.event.inputs.pull_request }}
          refresh-message-position: true
          allow-repeats: true
          message: |
            :warning: [PHPCS](${{ env.GHA_URL }}) executed! There's no need for any changes.

      - name: Run PHPCBF autofix
        run: |
          ${{ steps.phpcs-config.outputs.phpcbf }} ${{ steps.phpcs-config.outputs.standard_args }} . || true

      - name: Verify Changed files
        uses: tj-actions/verify-changed-files@v20
        id: verify-changed-files

      - name: Config git
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: |
          git config --local user.email "150967461+gstraccini[bot]@users.noreply.github.com"
          git config --local user.name "gstraccini[bot]"
          git config --global --add --bool push.autoSetupRemote true

      - name: Commit files
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: |
          git add .
          git commit -m "PHPCS autofix"
          echo "sha1=$(git rev-parse HEAD)" >> $GITHUB_ENV
          git push origin ${{ github.event.inputs.branch }}

      - name: Mark check run as success
        if: success()
        uses: LouisBrunner/checks-action@v3.1.0
        with:
          token: ${{ steps.generate_token.outputs.token }}
          repo: ${{ github.event.inputs.owner }}/${{ github.event.inputs.repository }}
          check_id: ${{ github.event.inputs.checkRunId }}
          conclusion: success
          details_url: ${{ env.GHA_URL }}
          output: |
            {"title": "Workflow passed ✅", "summary": "See details in the workflow run."}

      - name: Update PR with comment (failed)
        uses: mshick/add-pr-comment@v3
        if: ${{ failure() }}
        with:
          repo-token: ${{ steps.generate_token.outputs.token }}
          repo-owner: ${{ github.event.inputs.owner }}
          repo-name: ${{ github.event.inputs.repository }}
          issue: ${{ github.event.inputs.pull_request }}
          refresh-message-position: true
          allow-repeats: true
          message: |
            :x: [PHPCS](${{ env.GHA_URL }}) failed!

      - name: Mark check run as failure
        if: failure()
        uses: LouisBrunner/checks-action@v3.1.0
        with:
          token: ${{ steps.generate_token.outputs.token }}
          repo: ${{ github.event.inputs.owner }}/${{ github.event.inputs.repository }}
          check_id: ${{ github.event.inputs.checkRunId }}
          conclusion: failure
          details_url: ${{ env.GHA_URL }}
          output: |
            {"title": "Workflow failed ❌", "summary": "See details in the workflow run."}
